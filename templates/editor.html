<!DOCTYPE html>
<html>
<head>
<title>Newsletter Editor</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI";
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #1e3c72;
    color: white;
    padding: 20px;
}

/* Tabs */
.tabs {
    width: 220px;
    background: #f4f6f9;
    padding: 15px;
    overflow-y: auto;
}

.tabs button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border: none;
    background: white;
    cursor: pointer;
    border-radius: 6px;
}

.tabs button:hover {
    background: #2a5298;
    color: white;
}

/* Editor */
.editor {
    flex: 1;
    padding: 20px;
}

.section {
    display: none;
}

.section.active {
    display: block;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

.save {
    background: #2a5298;
    color: white;
    padding: 10px;
    border: none;
}
</style>

<script>
function showTab(id){
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
</script>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Newsletter</h2>
    <p>Editor</p>
</div>

<!-- Tabs -->
<div class="tabs">

<button onclick="showTab('cover')">Cover</button>
<button onclick="showTab('chairman')">Chairman</button>
<button onclick="showTab('principal')">Principal</button>
<button onclick="showTab('contents')">Contents</button>
<button onclick="showTab('events')">Events</button>
<button onclick="showTab('training')">Training</button>
<button onclick="showTab('workshop')">Workshop</button>
<button onclick="showTab('achievement')">Achievements</button>
<button onclick="showTab('seminar')">Seminar</button>
<button onclick="showTab('dakshaa')">Dakshaa</button>
<button onclick="showTab('celebration')">Celebration</button>
<button onclick="showTab('editorial')">Editorial</button>
<button onclick="showTab('last')">Last Page</button>

</div>

<!-- Editor Area -->
<div class="editor">

<form method="POST" enctype="multipart/form-data">

<!-- COVER -->
<div id="cover" class="section active">
<h2>Cover Page</h2>
<input name="title" placeholder="Newsletter Title">
<input type="file" name="cover_image">
</div>

<!-- CHAIRMAN -->
<div id="chairman" class="section">
<h2>Chairman Message</h2>
<textarea name="chairman"></textarea>
</div>

<!-- PRINCIPAL -->
<div id="principal" class="section">
<h2>Principal Message</h2>
<textarea name="principal"></textarea>
</div>

<!-- CONTENTS -->
<div id="contents" class="section">
<h2>Contents</h2>
<textarea name="contents"></textarea>
</div>

<!-- EVENTS -->
<div id="events" class="section">
<h2>Events</h2>
<textarea name="events"></textarea>
<input type="file" name="event_img">
</div>

<!-- TRAINING -->
<div id="training" class="section">
<h2>Training</h2>
<textarea name="training"></textarea>
</div>

<!-- WORKSHOP -->
<div id="workshop" class="section">
<h2>Workshop</h2>
<textarea name="workshop"></textarea>
</div>

<!-- ACHIEVEMENT -->
<div id="achievement" class="section">
<h2>Achievements</h2>
<textarea name="achievement"></textarea>
</div>

<!-- SEMINAR -->
<div id="seminar" class="section">
<h2>Seminar</h2>
<textarea name="seminar"></textarea>
</div>

<!-- DAKSHAA -->
<div id="dakshaa" class="section">
<h2>Dakshaa</h2>
<textarea name="dakshaa"></textarea>
</div>

<!-- CELEBRATION -->
<div id="celebration" class="section">
<h2>Celebration</h2>
<textarea name="celebration"></textarea>
</div>

<!-- EDITORIAL -->
<div id="editorial" class="section">
<h2>Editorial</h2>
<textarea name="editorial"></textarea>
</div>

<!-- LAST -->
<div id="last" class="section">
<h2>Last Page Quote</h2>
<textarea name="last"></textarea>
</div>

<button class="save">Save Newsletter</button>

</form>

</div>

</body>
</html>
