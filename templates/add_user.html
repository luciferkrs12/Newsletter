<!DOCTYPE html>
<html>
<head>
<title> Newsletter Editor </title>
<link rel="icon" type="image/png" href="/static/Brand_logo.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    background: linear-gradient(180deg, #f3f7ff 0%, #eef2ff 100%);
    color: #1f2937;
}

.sidebar {
    width: 260px;
    min-height: 100vh;
    background: linear-gradient(180deg, #1e3c72, #2a5298);
    color: white;
    padding: 26px 24px;
    position: fixed;
}

.logo-title {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 32px;
}

.logo-mark {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo-mark img {
    width: 90%;
    height: 90%;
    object-fit: contain;
}

.logo-title h3 {
    font-size: 20px;
    margin: 0;
}

.menu a {
    display: block;
    padding: 14px 14px;
    margin: 10px 0;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    transition: background 0.25s ease;
}

.menu a:hover {
    background: rgba(255,255,255,0.16);
}

.logout {
    position: absolute;
    bottom: 24px;
    width: calc(100% - 48px);
    background: #ef4444;
    text-align: center;
    padding: 14px;
    border-radius: 14px;
}

.logout a {
    color: white;
    text-decoration: none;
    font-weight: 600;
}

.main {
    margin-left: 280px;
    padding: 36px;
    width: calc(100% - 280px);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
}

.header h2 {
    font-size: 28px;
    color: #111827;
}

.add-btn {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.add-btn:hover {
    box-shadow: 0 14px 30px rgba(59,130,246,0.25);
    transform: translateY(-1px);
}

.card {
    background: white;
    padding: 28px;
    border-radius: 20px;
    margin-top: 24px;
    box-shadow: 0 18px 40px rgba(15,23,42,0.08);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    padding: 16px 14px;
    text-align: left;
    border-bottom: 2px solid #eef2ff;
    color: #475569;
    font-weight: 600;
}

td {
    padding: 16px 14px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
}

.role-badge {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 999px;
    background: #e0f2fe;
    color: #1d4ed8;
    font-size: 12px;
    font-weight: 600;
}

.action-group {
    display: flex;
    gap: 8px;
}

.btn {
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    transition: transform 0.15s ease, opacity 0.15s ease;
}

.btn:hover {
    opacity: 0.92;
    transform: translateY(-1px);
}

.role { background: #2563eb; color: white; }
.reset { background: #f59e0b; color: white; }
.delete { background: #ef4444; color: white; }

tr:hover {
    background: #f8fbff;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.55);
    backdrop-filter: blur(3px);
    z-index: 50;
}

.modal.active {
    display: block;
}

.modal-content {
    background: white;
    padding: 28px;
    width: min(420px, calc(100% - 40px));
    margin: auto;
    border-radius: 24px;
    box-shadow: 0 30px 80px rgba(15,23,42,0.14);
    position: relative;
    top: 10%;
}

.modal-content h3 {
    margin-bottom: 18px;
    font-size: 24px;
    color: #111827;
}

.form-field {
    position: relative;
    margin-bottom: 16px;
}

.form-field input,
.form-field select {
    width: 100%;
    padding: 14px 16px 14px 46px;
    border-radius: 14px;
    border: 1px solid #d2d6dc;
    background: #f8fafc;
    font-size: 15px;
    color: #111827;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.form-field input:focus,
.form-field select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
}

.form-field .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: #64748b;
}

.modal-btns {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 12px;
}

.submit-btn,
.cancel-btn {
    width: 100%;
    border-radius: 14px;
    padding: 12px 0;
    border: none;
    font-weight: 700;
    cursor: pointer;
}

.submit-btn {
    background: #2563eb;
    color: white;
}

.cancel-btn {
    background: #f3f4f6;
    color: #334155;
}

.submit-btn:hover,
.cancel-btn:hover {
    opacity: 0.95;
}

@media (max-width: 900px) {
    .main {
        margin-left: 0;
        width: 100%;
        padding: 24px;
    }

    .sidebar {
        position: relative;
        width: 100%;
        min-height: auto;
    }
}


</style>

<script>
function openModal(){
    document.getElementById("modal").classList.add("active");
}

function closeModal(){
    document.getElementById("modal").classList.remove("active");
}

window.addEventListener("click", function(event) {
    const modal = document.getElementById("modal");
    if (event.target === modal) {
        closeModal();
    }
});
</script>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

<div class="logo-title">
    <div class="logo-mark"><img src="/static/Brand_logo.png" alt="Logo"></div>
    <div>
        <h3>Newsletter</h3>
    </div>
</div>

<div class="menu">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/editor">✨ Create</a>
    <a href="/add-user">👤 Users</a>
</div>

<div class="logout">
    <form action="/logout" method="post" style="margin:0;">
        <button type="submit" style="all: unset; cursor: pointer; color: white; width: 100%; display: block; text-align: center; font-weight: 600;">Logout</button>
    </form>
</div>

</div>

<!-- Main -->
<div class="main">

<div class="header">
    <h2>User Management</h2>
    <button class="add-btn" onclick="openModal()">+ Add User</button>
</div>

<div class="card">

<table>
<tr>
    <th>ID</th>
    <th>Email</th>
    <th>Role</th>
    <th>Actions</th>
</tr>

{% for u in users %}
<tr>
    <td>{{u[0]}}</td>
    <td>{{u[1]}}</td>

    <td>
        <span class="role-badge">{{u[2]}}</span>
    </td>

    <td>
        <div class="action-group">

            <a href="/change-role/{{u[0]}}">
                <button class="btn role">Role</button>
            </a>

            <a href="/reset-password/{{u[0]}}">
                <button class="btn reset">Reset</button>
            </a>

            <a href="/delete-user/{{u[0]}}" onclick="return confirm('Delete user?')">
                <button class="btn delete">Delete</button>
            </a>

        </div>
    </td>

</tr>
{% endfor %}

</table>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">

        <h3>Add User</h3>

        <form method="POST">
            <div class="form-field">
                <span class="icon">✉️</span>
                <input name="username" type="email" placeholder="Email" required>
            </div>

            <div class="form-field">
                <span class="icon">🔒</span>
                <input name="password" type="password" placeholder="Password" required>
            </div>

            <div class="form-field">
                <span class="icon">👤</span>
                <select name="role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="modal-btns">
                <button type="submit" class="submit-btn">Create</button>
                <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
            </div>
        </form>

    </div>
</div>

</body>
</html>
