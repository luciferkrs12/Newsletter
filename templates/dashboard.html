<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    background: linear-gradient(180deg, #eef2ff, #f8fafc);
}

.sidebar {
    width: 240px;
    background: #1e3c72;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 32px 20px;
    min-height: 100vh;
}

.sidebar .logo-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 30px;
}

.sidebar .logo-mark {
    width: 40px;
    height: 40px;
    background: #2563eb;
    border-radius: 14px;
    display: grid;
    place-items: center;
    font-size: 18px;
    font-weight: 700;
}

.sidebar h2 {
    font-size: 20px;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
    text-decoration: none;
    padding: 14px 16px;
    border-radius: 14px;
    margin-bottom: 12px;
    transition: background 0.25s ease, transform 0.25s ease;
}

.nav-item:hover {
    background: rgba(255,255,255,0.14);
    transform: translateX(2px);
}

.logout-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 14px;
    margin-top: 24px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 700;
}

.container {
    flex: 1;
    padding: 32px;
    max-width: 1200px;
    margin-left: 240px;
}

.page-heading {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
}

.page-heading h1 {
    margin: 0;
    font-size: 32px;
    color: #111827;
}

.user-badge {
    background: white;
    padding: 12px 16px;
    border-radius: 16px;
    box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
    color: #334155;
    font-weight: 600;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Table */
.table {
    background: white;
    padding: 20px;
    border-radius: 12px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

a.btn {
    padding: 6px 12px;
    background: #2a5298;
    color: white;
    border-radius: 6px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="sidebar">
    <div>
        <div class="logo-title">
            <div class="logo-mark">N</div>
            <div>
                <h2>Newsletter</h2>
                <p style="font-size:13px; color:#cbd5e1; margin:4px 0 0;">College Portal</p>
            </div>
        </div>

        <a class="nav-item" href="/dashboard">🏠 Dashboard</a>
        <a class="nav-item" href="/editor">✍️ Create Newsletter</a>
        <a class="nav-item" href="/add-user">👤 Add User</a>
    </div>

    <a class="logout-btn" href="/logout">🚪 Logout</a>
</div>

<div class="container">
    <div class="page-heading">
        <h1>Dashboard</h1>
        <div class="user-badge">Welcome, {{session['user']}}</div>
    </div>

    <div class="main">

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Newsletters</h3>
            <p>{{data|length}}</p>
        </div>

        <div class="card">
            <h3>Created Today</h3>
            <p>--</p>
        </div>

        <div class="card">
            <h3>Departments</h3>
            <p>--</p>
        </div>
    </div>

    <!-- Table -->
    <div class="table">
        <h2>All Newsletters</h2>

        <table>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Action</th>
            </tr>

            {% for i in data %}
            <tr>
                <td>{{i[0]}}</td>
                <td>{{i[1]}}</td>
                <td>
                    <a class="btn" href="/pdf/{{i[0]}}">Download</a>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

    </div>
</div>

</body>
</html>
