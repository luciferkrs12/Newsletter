<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> Newsletter </title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    position: relative;
    min-height: 100vh;
    background: linear-gradient(180deg, rgba(15, 23, 42, 0.90), rgba(49, 130, 206, 0.95));
    display: flex;
    justify-content: center;
    align-items: center;
    color: #f8fafc;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    pointer-events: none;
}

.login-box {
    position: relative;
    width: 420px;
    max-width: 95%;
    background: rgba(255, 255, 255, 0.92);
    padding: 40px 36px;
    border-radius: 24px;
    box-shadow: 0 30px 70px rgba(15, 23, 42, 0.35);
    text-align: center;
    overflow: hidden;
    animation: fadeIn 0.7s ease;
}

.login-box::before {
    content: "Newsletter Portal";
    position: absolute;
    top: 16px;
    left: 24px;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: #2563eb;
    text-transform: uppercase;
}

.logo-mark {
    width: 84px;
    height: 84px;
    margin: 0 auto 18px;
    border-radius: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, #2563eb 0%, #1d4ed8 100%);
    color: #ffffff;
    font-size: 36px;
    font-weight: 800;
    box-shadow: 0 18px 40px rgba(37, 99, 235, 0.18);
}

.login-box h2 {
    margin-bottom: 12px;
    color: #111827;
    font-size: 28px;
    letter-spacing: -0.03em;
}

.login-box p {
    margin-bottom: 24px;
    color: #4b5563;
}

.login-box input {
    width: 100%;
    padding: 14px 16px;
    margin: 12px 0;
    border-radius: 14px;
    border: 1px solid #d1d5db;
    outline: none;
    font-size: 15px;
    transition: 0.25s ease;
}

.login-box input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
}

.login-box button {
    width: 100%;
    padding: 14px 16px;
    margin-top: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.login-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 40px rgba(37, 99, 235, 0.22);
}

.forgot {
    text-align: right;
    font-size: 13px;
    margin-top: 4px;
}

.forgot a {
    text-decoration: none;
    color: #2563eb;
}

.forgot a:hover {
    text-decoration: underline;
}

.google-login {
    margin-top: 20px;
}

.google-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid #d1d5db;
    background: #ffffff;
    color: #111827;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
}

.google-button img {
    width: 20px;
    margin-right: 10px;
}

.google-button:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
}

.subtitle {
    margin-bottom: 22px;
    color: #6b7280;
    font-size: 15px;
}


@keyframes fadeIn {
    from {opacity: 0; transform: translateY(24px);}
    to {opacity: 1; transform: translateY(0);}
}

@media (max-width: 520px) {
    body {
        padding: 24px;
        align-items: flex-start;
    }

    .login-box {
        width: 100%;
        padding: 28px 24px;
    }
}
</style>
</head>

<body>

<div class="login-box">

    <!-- 🔹 College Logo -->
    <div class="logo-mark">K</div>

    <h2>Newsletter Login</h2>
    <p class="subtitle">Welcome to K.S.Rangasamy College of Technology NewsLetter portal</p>

    <form method="POST">
        <input type="email" name="username" placeholder="Email" value="naren2004@gmail.com" required>
        
        <input type="password" name="password" placeholder="Password" value="12345" required>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="google-login">
        <a href="/google-login" class="google-button">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" alt="Google logo">
            Continue with Google
        </a>
    </div>

    <div class="footer">
        College Newsletter System
    </div>

</div>

</body>
</html>
